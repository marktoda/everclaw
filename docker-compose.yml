services:
  assistant:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./skills:/app/skills
      - ./scripts:/app/scripts
      - ./.env:/app/.env:ro
    environment:
      # Only non-secret config
      - DATABASE_URL=postgresql://postgres:postgres@db/absurd
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=absurd
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5

  habitat:
    build:
      context: .
      dockerfile: Dockerfile.habitat
    restart: unless-stopped
    environment:
      - HABITAT_DB_URL=postgresql://postgres:postgres@db/absurd?sslmode=disable
      - HABITAT_LISTEN=:7890
    ports:
      - "7890:7890"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
